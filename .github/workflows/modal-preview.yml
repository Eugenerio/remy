name: Modal — preview on PR

on:
  pull_request:
    paths:
      - 'services/modal/**'
      - 'services/comfyui/**'

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install modal
        run: pip install modal ruff
      - name: Lint
        run: ruff check services/modal services/ai
      - name: Modal check
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal config check || echo "no token configured, skipping"
