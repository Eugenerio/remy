# Railway per-service config for the FastAPI AI service.
[build]
builder = "DOCKERFILE"
dockerfilePath = "services/ai/Dockerfile"
contextPath = "."

[deploy]
startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port 8001"
healthcheckPath = "/internal/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
